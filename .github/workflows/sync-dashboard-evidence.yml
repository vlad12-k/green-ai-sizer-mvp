name: Sync dashboard evidence copies

on:
  push:
    branches: ["main"]
    paths:
      - "data/grid_intensity_uk_summary.json"
      - "scripts/probe_run_summary.json"
      - "data/scenario-baseline-improved.csv"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-dashboard-evidence
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (main)
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Sync dashboard evidence files
        run: |
          cp data/grid_intensity_uk_summary.json docs/evidence/grid_intensity_uk_summary.json
          cp scripts/probe_run_summary.json docs/evidence/probe_run_summary.json
          cp data/scenario-baseline-improved.csv docs/evidence/scenario-baseline-improved.csv

      - name: Commit and push updates to main when changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add docs/evidence/grid_intensity_uk_summary.json docs/evidence/probe_run_summary.json docs/evidence/scenario-baseline-improved.csv
          if git diff --cached --quiet; then
            echo "No dashboard evidence copy changes to commit."
            exit 0
          fi

          git commit -m "docs: sync dashboard evidence copies (auto)"
          git push origin HEAD:main
