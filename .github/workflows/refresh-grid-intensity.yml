name: Refresh UK grid intensity snapshot

on:
  schedule:
    # Daily at 06:10 UTC
    - cron: "10 6 * * *"
  workflow_dispatch:

concurrency:
  group: refresh-grid-intensity
  cancel-in-progress: true

jobs:
  refresh_data:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout (main)
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run fetch script
        run: |
          python scripts/fetch_uk_grid_intensity.py

      - name: Upload refreshed data artifact
        uses: actions/upload-artifact@v4
        with:
          name: grid-intensity-refresh
          if-no-files-found: error
          path: |
            data/grid_intensity_uk_snapshot.csv
            data/grid_intensity_uk_summary.json

  publish_refresh:
    needs: refresh_data
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout (main)
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Download refreshed data artifact
        uses: actions/download-artifact@v4
        with:
          name: grid-intensity-refresh
          path: /tmp/grid-intensity-refresh

      - name: Restore refreshed files into repository paths
        run: |
          python - <<'PY'
          import shutil
          from pathlib import Path

          artifact_root = Path('/tmp/grid-intensity-refresh')
          mapping = {
              'grid_intensity_uk_snapshot.csv': Path('data/grid_intensity_uk_snapshot.csv'),
              'grid_intensity_uk_summary.json': Path('data/grid_intensity_uk_summary.json'),
          }

          for name, target in mapping.items():
              matches = list(artifact_root.rglob(name))
              if not matches:
                  raise SystemExit(f"Missing artifact file: {name}")
              target.parent.mkdir(parents=True, exist_ok=True)
              shutil.copyfile(matches[0], target)
              print(f"Restored {name} -> {target}")
          PY

      - name: Sync dashboard evidence summary
        run: |
          cp data/grid_intensity_uk_summary.json docs/evidence/grid_intensity_uk_summary.json

      - name: Extract refresh status values
        id: summary
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          payload = json.loads(Path('data/grid_intensity_uk_summary.json').read_text(encoding='utf-8'))
          generated = str(payload.get('generated_utc', 'unknown'))
          min_v = str(payload.get('min_g_per_kwh', 'unknown'))
          avg_v = str(payload.get('avg_g_per_kwh', 'unknown'))
          max_v = str(payload.get('max_g_per_kwh', 'unknown'))

          with open(Path.cwd() / '.summary.out', 'w', encoding='utf-8') as out:
              out.write(f"generated_utc={generated}\n")
              out.write(f"min_g_per_kwh={min_v}\n")
              out.write(f"avg_g_per_kwh={avg_v}\n")
              out.write(f"max_g_per_kwh={max_v}\n")
          PY
          cat .summary.out >> "$GITHUB_OUTPUT"

      - name: Create PR if changed
        id: cpr
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "data: refresh UK grid intensity snapshot (auto)"
          title: "data: refresh UK grid intensity snapshot (auto)"
          body: |
            Automated refresh of grid-intensity evidence.

            Updated files:
            - data/grid_intensity_uk_snapshot.csv
            - data/grid_intensity_uk_summary.json
            - docs/evidence/grid_intensity_uk_summary.json

            Snapshot summary:
            - timestamp: `${{ steps.summary.outputs.generated_utc }}`
            - min / avg / max: `${{ steps.summary.outputs.min_g_per_kwh }}` / `${{ steps.summary.outputs.avg_g_per_kwh }}` / `${{ steps.summary.outputs.max_g_per_kwh }}` gCO₂/kWh
          branch: "automation/refresh-grid-intensity"
          base: "main"
          add-paths: |
            data/grid_intensity_uk_snapshot.csv
            data/grid_intensity_uk_summary.json
            docs/evidence/grid_intensity_uk_summary.json
          delete-branch: true

      - name: Post PR refresh status comment
        if: steps.cpr.outputs.pull-request-number != ''
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = Number('${{ steps.cpr.outputs.pull-request-number }}');
            const body = [
              '### Automated grid snapshot status',
              `- snapshot timestamp: \`${{ steps.summary.outputs.generated_utc }}\``,
              `- min intensity: **${{ steps.summary.outputs.min_g_per_kwh }} gCO₂/kWh**`,
              `- avg intensity: **${{ steps.summary.outputs.avg_g_per_kwh }} gCO₂/kWh**`,
              `- max intensity: **${{ steps.summary.outputs.max_g_per_kwh }} gCO₂/kWh**`,
              '',
              'Dashboard evidence source refreshed: `docs/evidence/grid_intensity_uk_summary.json`.'
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body
            });

      - name: Enable PR auto-merge
        id: enable_automerge
        if: steps.cpr.outputs.pull-request-number != ''
        continue-on-error: true
        uses: peter-evans/enable-pull-request-automerge@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          pull-request-number: ${{ steps.cpr.outputs.pull-request-number }}
          merge-method: squash

      - name: Fallback note when auto-merge cannot be enabled
        if: steps.cpr.outputs.pull-request-number != '' && steps.enable_automerge.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = Number('${{ steps.cpr.outputs.pull-request-number }}');
            const body = [
              '⚠️ Auto-merge could not be enabled for this PR.',
              '',
              'Fallback applied:',
              '- data was pushed to dedicated branch `automation/refresh-grid-intensity`',
              `- PR #${prNumber} remains open for normal review/merge`,
              '',
              'See `/docs/ops/github-actions.md` for required repository settings to allow auto-merge.'
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body
            });
