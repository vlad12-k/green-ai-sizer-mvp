name: Refresh UK grid intensity snapshot

on:
  schedule:
    # Daily at 06:10 UTC
    - cron: "10 6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: refresh-grid-intensity
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (main)
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run fetch script
        run: |
          python scripts/fetch_uk_grid_intensity.py

      - name: Create PR if changed
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "data: refresh UK grid intensity snapshot (auto)"
          title: "data: refresh UK grid intensity snapshot (auto)"
          body: |
            Automated update of:
            - data/grid_intensity_uk_snapshot.csv
            - data/grid_intensity_uk_summary.json

            Generated by workflow: Refresh UK grid intensity snapshot
          branch: "automation/refresh-grid-intensity"
          base: "main"
          add-paths: |
            data/grid_intensity_uk_snapshot.csv
            data/grid_intensity_uk_summary.json
          delete-branch: true
