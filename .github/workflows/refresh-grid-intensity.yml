name: Refresh UK grid intensity snapshot

on:
  schedule:
    # Daily at 06:10 UTC
    - cron: "10 6 * * *"
  workflow_dispatch:

concurrency:
  group: refresh-grid-intensity
  cancel-in-progress: true

jobs:
  refresh_data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout (main)
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run fetch script
        run: |
          python scripts/fetch_uk_grid_intensity.py

      - name: Validate canonical output files exist
        run: |
          test -f data/grid_intensity_uk_snapshot.csv
          test -f data/grid_intensity_uk_summary.json

      - name: Sync dashboard evidence summary
        run: |
          cp data/grid_intensity_uk_summary.json docs/evidence/grid_intensity_uk_summary.json

      - name: Commit and push updates to main when changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data/grid_intensity_uk_snapshot.csv data/grid_intensity_uk_summary.json docs/evidence/grid_intensity_uk_summary.json
          if git diff --cached --quiet; then
            echo "No grid-intensity changes to commit."
            exit 0
          fi

          git commit -m "data: refresh UK grid intensity snapshot (auto)"
          git push origin HEAD:main
