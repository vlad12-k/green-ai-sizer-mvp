name: Docs and Pages integrity check

on:
  pull_request:
  push:
    branches: [ "main" ]

jobs:
  docs-check:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check Pages entry point exists
        run: |
          echo "Checking docs/index.html..."
          test -f docs/index.html || { echo "ERROR: docs/index.html is missing"; exit 1; }
          echo "OK: docs/index.html exists"

      - name: Check required evidence files referenced by dashboard exist
        run: |
          missing=0
          for f in \
            "data/grid_intensity_uk_summary.json" \
            "scripts/probe_run_summary.json" \
            "workbook/appendix-d-baseline-improved.csv" \
            "workbook/calc_co2e.py" \
            "docs/styles.css" \
            "docs/app.js"; do
            if [ ! -f "$f" ]; then
              echo "ERROR: required evidence file missing: $f"
              missing=1
            else
              echo "OK: $f"
            fi
          done
          [ "$missing" -eq 0 ] || exit 1

      - name: Check README has no broken code fences
        run: |
          python3 - <<'EOF'
          import sys, re

          with open("README.md", encoding="utf-8") as fh:
              text = fh.read()

          # Count triple-backtick occurrences; should be even (paired)
          ticks = re.findall(r'^```', text, flags=re.MULTILINE)
          if len(ticks) % 2 != 0:
              print(f"ERROR: Odd number of code fences in README.md ({len(ticks)} found). Fences may be unpaired.")
              sys.exit(1)

          print(f"OK: README.md code fences balanced ({len(ticks)} found, {len(ticks)//2} blocks)")
          EOF

      - name: Validate workbook CSV is parseable and has required headers
        run: |
          python3 - <<'EOF'
          import csv, sys

          required = [
              "scenario", "requests_per_day", "cache_hit_rate", "small_route_rate",
              "wh_small", "wh_large", "grid_intensity_g_per_kwh"
          ]
          path = "workbook/appendix-d-baseline-improved.csv"

          with open(path, newline="", encoding="utf-8") as f:
              rows = list(csv.DictReader(f))

          if not rows:
              print("ERROR: CSV is empty")
              sys.exit(1)

          missing = [h for h in required if h not in rows[0].keys()]
          if missing:
              print(f"ERROR: CSV missing required headers: {missing}")
              sys.exit(1)

          scenarios = [r["scenario"].strip().lower() for r in rows if r.get("scenario")]
          if "improved" not in scenarios:
              print("ERROR: No 'improved' row found in CSV")
              sys.exit(1)

          print(f"OK: CSV valid — {len(rows)} row(s), scenarios: {scenarios}")
          EOF
