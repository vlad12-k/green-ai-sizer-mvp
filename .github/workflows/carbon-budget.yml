name: Carbon Budget Gate

on:
  pull_request_target:
  push:
    branches: [ "main" ]

jobs:
  carbon-budget:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run CO2e budget check
        run: |
          python workbook/calc_co2e.py 200
